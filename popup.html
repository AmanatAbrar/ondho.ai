<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Ondho<span class="highlight">.ai</span></h1>
      <p class="tagline">Removing the blindfold.</p>
    </div>

    <div id="loading-section">
      <p>Analyzing article...</p>
    </div>

    <div id="results-section" style="display: none;">
      <div class="score-circle">
        <span id="trust-score" class="score-number">--</span>
        <span class="score-label">Trust Score</span>
      </div>

      <div class="metrics-grid">
        <div class="metric-box">
          <span class="metric-title">Bias Direction</span>
          <span id="bias-dir" class="metric-value">--</span>
        </div>
        <div class="metric-box">
          <span class="metric-title">Sensationalism</span>
          <span id="sens-level" class="metric-value">--</span>
        </div>
        <div class="metric-box">
          <span class="metric-title">Headline vs Body</span>
          <span id="headline-match" class="metric-value">--</span>
        </div>
        <div class="metric-box">
          <span class="metric-title">Source Status</span>
          <span class="metric-value success">Verified</span>
        </div>
      </div>

      <div class="reasoning-box">
        <h3>AI Insight</h3>
        <p id="ai-reason">--</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
